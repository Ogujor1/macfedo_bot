{% extends "admin/base_site.html" %}
{% block content %}
<h1>Send Broadcast to Customers</h1>
<p><strong>Total active customers:</strong> {{ customers_count }}</p>

<form method="post">
{% csrf_token %}
<table>
<tr>
<td><label>Broadcast Title:</label></td>
<td><input type="text" name="title" required style="width:300px" placeholder="e.g. New Arrival March 2026"/></td>
</tr>
<tr>
<td><label>Template Name:</label></td>
<td>
<select name="template_name" required style="width:300px">
<option value="macfedo_new_ordering_line">macfedo_new_ordering_line — New Bot Number (1 var)</option>
<option value="macfedo_new_arrival">macfedo_new_arrival — New Arrival (3 vars)</option>
<option value="macfedo_promo">macfedo_promo — 15% Off 4+ Pairs (1 var)</option>
<option value="macfedo_restock">macfedo_restock — Back In Stock (2 vars)</option>
<option value="macfedo_announcement">macfedo_announcement — Announcement (2 vars)</option>
<option value="macfedo_free_delivery">macfedo_free_delivery — Free Delivery Offer (1 var)</option>
</select>
</td>
</tr>
<tr>
<td><label>Product Name:</label></td>
<td><input type="text" name="product" style="width:300px" placeholder="e.g. Premium Halfshoes"/></td>
</tr>
<tr>
<td><label>Price:</label></td>
<td><input type="text" name="price" style="width:300px" placeholder="e.g. 36,999.99"/></td>
</tr>
<tr>
<td><label>Send To:</label></td>
<td>
<select name="tag_filter" style="width:300px">
<option value="all">All Customers ({{ customers_count }})</option>
<option value="customer">Confirmed Customers Only</option>
<option value="enquiry">Enquiries Only</option>
</select>
</td>
</tr>
</table>
<br>
<p style="color:red"><strong>⚠️ Warning:</strong> This will send messages to all selected customers. Make sure your template is approved before sending.</p>
<input type="submit" value="🚀 Send Broadcast Now" style="background:#417690;color:white;padding:10px 20px;border:none;cursor:pointer;font-size:16px"/>
</form>
{% endblock %}
